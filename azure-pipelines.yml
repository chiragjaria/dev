# ❌ Disable ALL automatic triggers
trigger: none
pr: none

pool:
  name: aks-agent-pool

variables:
  terraformVersion: '1.5.7'

stages:

# ---------------- PLAN ----------------
- stage: Plan
  displayName: "Terraform Plan"
  jobs:
  - job: TerraformPlan
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(Build.SourceBranchName).tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(Build.SourceBranchName).tfvars'


# ---------------- APPLY ----------------
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan

  # ❌ Never run Apply during PR (extra safety)
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

  jobs:
  - job: TerraformApply
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # 🔥 IMPORTANT: Init again (new agent)
    - task: TerraformTaskV4@4
      displayName: "Terraform Init (Apply)"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(Build.SourceBranchName).tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(Build.SourceBranchName).tfvars -auto-approve'
