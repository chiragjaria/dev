trigger:
  branches:
    include:
      - dev
      - preprod
      - prod

pool:
  name: aks-agent-pool

variables:
  terraformVersion: '1.5.7'

stages:

# ---------------- PLAN ----------------
- stage: Plan
  displayName: "Terraform Plan"
  jobs:
  - job: TerraformPlan
    steps:

    - checkout: self

    # Install Terraform
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # Debug (helps verify correct folder/files)
    - script: |
        echo "Current directory:"
        pwd
        echo "Listing files:"
        ls -R
      displayName: "Debug Repo Structure"

    # Terraform Init (CLEAN INIT)
    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(Build.SourceBranchName).tfstate'

    # Terraform Plan
    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(Build.SourceBranchName).tfvars'


# ---------------- APPLY ----------------
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: TerraformApply
    steps:

    - checkout: self

    # Install Terraform
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # 🔥 CRITICAL: Init AGAIN (new agent)
    - task: TerraformTaskV4@4
      displayName: "Terraform Init (Apply)"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(Build.SourceBranchName).tfstate'

    # Terraform Apply
    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(Build.SourceBranchName).tfvars -auto-approve'
