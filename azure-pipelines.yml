# ❌ Disable auto run on code pus
trigger: none

# ❌ Disable PR auto trigger (we'll control via policy or manual)
pr: none

pool:
  name: aks-agent-pool

variables:
  terraformVersion: '1.5.7'

  # 🔥 FIX: Correct branch name for PR + normal runs
  branchName: $[
    replace(
      coalesce(variables['System.PullRequest.TargetBranch'], variables['Build.SourceBranch']),
      'refs/heads/',
      ''
    )
  ]

stages:

# ---------------- PLAN ----------------
- stage: Plan
  displayName: "Terraform Plan"
  jobs:
  - job: TerraformPlan
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(branchName).tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(branchName).tfvars'


# ---------------- APPLY ----------------
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Plan

  # 🔥 IMPORTANT: No Apply during PR
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))

  jobs:
  - job: TerraformApply
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: "Terraform Init (Apply)"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(branchName).tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(branchName).tfvars -auto-approve'
