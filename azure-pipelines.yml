trigger:
  branches:
    include:
      - dev
      - preprod
      - prod

pool:
  name: aks-agent-pool

variables:
  terraformVersion: '1.5.7'

stages:

# ---------------- PLAN ----------------
- stage: Plan
  jobs:
  - job: TerraformPlan
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # DEBUG (IMPORTANT)
    - script: |
        echo "Listing repo files:"
        ls -R
      displayName: "Debug Files"

    - task: TerraformTaskV4@4
      displayName: "Terraform Init"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(Build.SourceBranchName).tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Plan"
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(Build.SourceBranchName).tfvars'


# ---------------- APPLY ----------------
- stage: Apply
  dependsOn: Plan
  condition: succeeded()
  jobs:
  - job: TerraformApply
    steps:

    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # 🔥 MISSING STEP (CRITICAL FIX)
    - task: TerraformTaskV4@4
      displayName: "Terraform Init (Apply)"
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'infra'
        backendServiceArm: 'azure-service-connection'
        backendAzureRmResourceGroupName: 'rgp-tddev-de-ci-dat-01'
        backendAzureRmStorageAccountName: 'tfstate123'
        backendAzureRmContainerName: 'tfstate'
        backendAzureRmKey: '$(Build.SourceBranchName).tfstate'

    - task: TerraformTaskV4@4
      displayName: "Terraform Apply"
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'infra'
        environmentServiceNameAzureRM: 'azure-service-connection'
        commandOptions: '-var-file=$(Build.SourceBranchName).tfvars -auto-approve'
